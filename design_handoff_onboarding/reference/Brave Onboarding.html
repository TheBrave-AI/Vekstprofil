/* ─────────────────────────────────────────────
   Question card
   ───────────────────────────────────────────── */

const qStyles = {
  category: {
    display: "inline-flex",
    alignItems: "center",
    gap: 8,
    fontSize: 12.5,
    letterSpacing: "0.12em",
    textTransform: "uppercase",

  },

  label: {

    fontWeight: 500,
    fontSize: "clamp(28px, 4.6vw, 42px)",
    lineHeight: 1.1,
    letterSpacing: "-0.015em",
    color: "var(--color-cloud)",
    textWrap: "pretty",
  },
  help: {
    marginTop: 16,
    fontSize: 16.5,
    lineHeight: 1.55,
    color: "var(--color-mist)",

  inputRow: {
    marginTop: 34,

    alignItems: "stretch",

    border: "1.5px solid var(--color-steel)",
    borderRadius: "var(--radius-xl)",
    overflow: "hidden",
    transition: "border-color 200ms ease, box-shadow 200ms ease",

  affix: {
    display: "flex",
    alignItems: "center",
    padding: "0 18px",
    fontSize: 17,
    fontWeight: 500,
    color: "var(--color-muted)",
    background: "transparent",

  input: {
    flex: 1,
    border: "none",
    outline: "none",
    background: "transparent",
    padding: "20px 20px",

    fontWeight: 500,
    color: "var(--color-cloud)",
    width: "100%",
    minWidth: 0,
  },
  textarea: {
    flex: 1,
    border: "none",
    outline: "none",
    background: "transparent",
    padding: "18px 20px",
    fontFamily: "var(--font-body)",
    fontSize: 18,
    fontWeight: 500,
    lineHeight: 1.5,
    color: "var(--color-cloud)",
    width: "100%",
    minWidth: 0,
    resize: "none",
    minHeight: 92,
  },
  actions: {
    marginTop: 28,
    display: "flex",
    alignItems: "center",
    gap: 14,
    flexWrap: "wrap",
  },
};

function QuestionCard({ q, value, onChange, onNext, onSkip, onBack, isFirst, autoFocusKey }) {
  const inputRef = useRef(null);
  const isText = q.type === "text";
  const stored = value === SKIPPED ? "" : (value || "");

  useEffect(() => {
    const t = setTimeout(() => inputRef.current && inputRef.current.focus(), 360);
    return () => clearTimeout(t);
  }, [autoFocusKey]);

  const [focused, setFocused] = useState(false);

  const handleKey = (e) => {
    if (e.key === "Enter" && !isText) {
      e.preventDefault();
      onNext();
    }
    if (e.key === "Enter" && isText && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      onNext();
    }
  };

  const rowStyle = {
    ...qStyles.inputRow,
    borderColor: focused ? "var(--color-accent)" : "var(--color-steel)",
    boxShadow: focused ? "0 0 0 4px rgba(12,139,160,0.14)" : "none",
  };

  return (
    <div>
      <div style={qStyles.category}>
        <span style={qStyles.catLine}></span>
        {q.category}
      </div>
      <h1 style={qStyles.label}>{q.label}</h1>
      <p style={qStyles.help}>{q.help}</p>

      <div style={rowStyle}>
        {q.prefix && <span style={qStyles.affix}>{q.prefix}</span>}
        {isText ? (
          <textarea
            ref={inputRef}
            style={qStyles.textarea}
            placeholder={q.placeholder}
            value={stored}
            onChange={(e) => onChange(e.target.value)}
            onKeyDown={handleKey}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
          />
        ) : (
          <input
            ref={inputRef}
            style={qStyles.input}
            inputMode={q.type === "number" ? "decimal" : "text"}
            placeholder={q.placeholder}
            value={stored}
            onChange={(e) => onChange(e.target.value)}
            onKeyDown={handleKey}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
          />
        )}
        {q.suffix && <span style={qStyles.affix}>{q.suffix}</span>}
      </div>

      <div style={qStyles.actions}>
        <PrimaryButton onClick={onNext}>
          {isFirst ? "Start" : "Neste"}
          <Arrow />
        </PrimaryButton>
        <GhostButton onClick={onSkip}>{SKIP_LABEL}</GhostButton>
        <button onClick={onBack} style={backBtnStyle}>{isFirst ? "← Avslutt" : "← Tilbake"}</button>
      </div>
    </div>
  );
}

const backBtnStyle = {

};

function Arrow() {
  return (
    <svg width="17" height="17" viewBox="0 0 17 17" fill="none" style={{ marginLeft: 2 }}>

    </svg>
  );
}

function PrimaryButton({ children, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 9,
        background: hover ? "var(--color-brand-deep)" : "var(--color-brand)",
        color: "var(--color-onbrand)",
        border: "none",
        borderRadius: "var(--radius-xl)",
        padding: "16px 26px",
        fontFamily: "var(--font-body)",
        fontSize: 16.5,
        fontWeight: 600,
        cursor: "pointer",
        boxShadow: hover ? "0 14px 30px -14px rgba(12,35,69,0.6)" : "0 8px 22px -14px rgba(12,35,69,0.5)",
        transform: hover ? "translateY(-1px)" : "translateY(0)",
        transition: "all 180ms ease",
      }}
    >
      {children}
    </button>
  );
}

function GhostButton({ children, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: hover ? "rgba(221,208,186,0.28)" : "transparent",
        color: "var(--color-mist)",
        border: "1.5px solid var(--color-steel)",
        borderRadius: "var(--radius-xl)",
        padding: "15px 22px",
        fontFamily: "var(--font-body)",
        fontSize: 15.5,
        fontWeight: 500,
        cursor: "pointer",
        transition: "all 180ms ease",
      }}
    >
      {children}
    </button>
  );
}

  row: {

    padding: "18px 4px",
    borderBottom: "1px solid var(--color-line)",

    fontFamily: "var(--font-display)", fontSize: 21, fontWeight: 500,

function formatAnswer(q, val) {
  if (val === SKIPPED || val === undefined || val === "" ) return null;
  let out = String(val).trim();
  if (q.prefix === "kr") {
    const num = Number(out.replace(/\s|kr/gi, "").replace(",", "."));
    if (!isNaN(num) && out.match(/^[\d\s.,]+(kr)?$/i)) {
      out = new Intl.NumberFormat("nb-NO").format(num) + " kr";
    }
  } else if (q.suffix === "%") {
    out = out.replace(/%/g, "").trim() + " %";
  } else if (q.suffix) {
    out = out + " " + q.suffix.replace(/^leads.*/, "leads").replace(/^timer.*/, "t/uke").replace(/^personer/, "pers.");
  }
  return out;
}

function Summary({ answers, onEdit, onRestart }) {
  const filled = QUESTIONS.filter((q) => answers[q.id] && answers[q.id] !== SKIPPED).length;
  return (
    <div>
      <div style={sumStyles.eyebrow}><span style={qStyles.catLine}></span> Ferdig</div>
      <h1 style={sumStyles.title}>Dette er nullpunktet deres.</h1>
      <p style={sumStyles.sub}>
        {filled} av {QUESTIONS.length} besvart. Vi lagrer kartleggingen og bruker den
        som referanse når vi måler vekst fremover. Klikk på et svar for å justere.
      </p>

      <div style={sumStyles.list}>
        {QUESTIONS.map((q, i) => {
          const raw = answers[q.id];
          const formatted = formatAnswer(q, raw);
          return (
            <div
              key={q.id}
              style={{ ...sumStyles.row, cursor: "pointer" }}
              onClick={() => onEdit(i)}
            >
              <div style={sumStyles.qText}>
                <span style={sumStyles.qCat}>{q.category}</span>
                <span style={sumStyles.qLabel}>{q.label}</span>
              </div>
              {formatted
                ? <span style={sumStyles.ans}>{formatted}</span>
                : <span style={sumStyles.ansSkip}>Ikke oppgitt</span>}
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 36, display: "flex", gap: 14, flexWrap: "wrap", alignItems: "center" }}>
        <PrimaryButton onClick={onRestart}>Send inn kartlegging <Arrow /></PrimaryButton>
        <GhostButton onClick={() => onEdit(0)}>Gå gjennom på nytt</GhostButton>
      </div>
    </div>
  );
}

    display: "flex",
    flexDirection: "column",
    padding: "clamp(20px, 4vw, 40px)",
  },
  card: {
    width: "100%",
    maxWidth: 720,
    margin: "0 auto",
    background: "var(--color-midnight)",
    border: "1px solid var(--color-line)",
    borderRadius: "var(--radius-card)",
    boxShadow: "var(--shadow-card)",
    padding: "clamp(28px, 4.4vw, 52px)",
    display: "flex",
    flexDirection: "column",
    flex: "0 0 auto",
  },
  center: {
    flex: 1,
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    width: "100%",
  },
  header: { marginBottom: 30 },
  stage: { position: "relative", overflow: "hidden" },
};

function App() {
  const [stage, setStage] = useState(STAGE_INTRO);
  const [answers, setAnswers] = useState({});
  const [draft, setDraft] = useState("");
  const [anim, setAnim] = useState("rest"); // direction class
  const [autoFocusKey, setAutoFocusKey] = useState(0);
  const [submitted, setSubmitted] = useState(false);

  const isQuestion = stage >= 0 && stage < QUESTIONS.length;
  const q = isQuestion ? QUESTIONS[stage] : null;

  // load draft when entering a question
  useEffect(() => {
    if (isQuestion) {
      const existing = answers[q.id];
      setDraft(existing === SKIPPED ? "" : (existing || ""));
    }
  }, [stage]);

  const go = (next, dir) => {
    setAnim(dir === "back" ? "out-back" : "out-fwd");
    setTimeout(() => {
      setStage(next);
      setAnim(dir === "back" ? "in-back" : "in-fwd");
      setAutoFocusKey((k) => k + 1);
    }, 240);
  };

  const commit = (val) => {
    if (q) setAnswers((a) => ({ ...a, [q.id]: val }));
  };

  const handleNext = () => {
    const trimmed = (draft || "").trim();
    commit(trimmed === "" ? SKIPPED : trimmed);
    go(stage + 1, "fwd");
  };

  const handleSkip = () => {
    commit(SKIPPED);
    go(stage + 1, "fwd");
  };

  const handleBack = () => {
    const trimmed = (draft || "").trim();
    if (trimmed !== "") commit(trimmed);
    go(stage - 1, "back");
  };

  const startStyle = {
    transition: "opacity 240ms ease, transform 240ms cubic-bezier(0.22, 1, 0.36, 1)",
    opacity: anim.startsWith("out") ? 0 : 1,
    transform:
      anim === "out-fwd" ? "translateX(-26px)" :
      anim === "out-back" ? "translateX(26px)" :
      anim === "in-back" ? "translateX(0)" : "translateX(0)",
  };

  // entering animation: start offset then settle
  const [entered, setEntered] = useState(true);
  useEffect(() => {
    if (anim === "in-fwd" || anim === "in-back") {
      setEntered(false);
      let raf2;
      const raf1 = requestAnimationFrame(() => {
        raf2 = requestAnimationFrame(() => setEntered(true));
      });
      return () => { cancelAnimationFrame(raf1); cancelAnimationFrame(raf2); };
    } else {
      setEntered(true);
    }
  }, [anim, stage]);

  const enterStyle = {
    transition: "opacity 320ms ease, transform 420ms cubic-bezier(0.22, 1, 0.36, 1)",
    opacity: anim.startsWith("out") ? 0 : (entered ? 1 : 0),
    transform: anim.startsWith("out")
      ? (anim === "out-fwd" ? "translateX(-24px)" : "translateX(24px)")
      : (entered ? "translateX(0)" : (anim === "in-back" ? "translateX(-24px)" : "translateX(24px)")),
  };

  let content;
  if (stage === STAGE_INTRO) {
    content = <Intro total={QUESTIONS.length} onStart={() => go(0, "fwd")} />;
  } else if (stage === STAGE_SUMMARY) {
    content = (
      <Summary
        answers={answers}
        onEdit={(i) => go(i, "back")}
        onRestart={() => setSubmitted(true)}
      />
    );
  } else {
    content = (
      <QuestionCard
        q={q}
        value={answers[q.id]}
        autoFocusKey={autoFocusKey}
        onChange={setDraft}
        onNext={handleNext}
        onSkip={handleSkip}
        onBack={handleBack}
        isFirst={stage === 0}
      />
    );
  }

  if (submitted) {
    return (
      <div style={appStyles.shell}>
        <div style={appStyles.center}>
          <div style={{ ...appStyles.card, alignItems: "flex-start", textAlign: "left" }}>
            <BrandBar />
            <div style={{ marginTop: 40 }}>
              <div style={{
                width: 52, height: 52, borderRadius: 999,
                background: "var(--color-accent)", display: "flex",
                alignItems: "center", justifyContent: "center", marginBottom: 24,
              }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M5 12.5l4.5 4.5L19 7" stroke="var(--color-onbrand)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              </div>
              <h1 style={introStyles.title}>Takk! Kartleggingen er sendt.</h1>
              <p style={{ ...introStyles.body, marginTop: 18 }}>
                Vi har lagret nullpunktet deres. Rådgiveren deres i Brave tar kontakt for
                neste steg — og vi måler vekst mot akkurat disse tallene fremover.
              </p>
              <div style={{ marginTop: 34 }}>
                <GhostButton onClick={() => { setSubmitted(false); setStage(STAGE_INTRO); setAnswers({}); }}>
                  Start på nytt
                </GhostButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={appStyles.shell}>
      <div style={appStyles.center}>
        <div style={appStyles.card}>
          <div style={appStyles.header}>
            <BrandBar />
          </div>
          {isQuestion && (
            <div style={{ marginBottom: 36 }}>
              <ProgressBar current={stage} total={QUESTIONS.length} />
            </div>
          )}
          <div style={appStyles.stage}>
            <div style={enterStyle}>
              {content}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
